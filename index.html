<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>진담중국어 팡팡!</title>
    <link rel="stylesheet" href="style.css" />
    <script src="data.js"></script>
    <script defer src="scripts.js"></script>
  </head>
  <body>
    <div id="game-area">
      <div id="top-bar">
        <div id="mode-board" class="top-stat">READY</div>
        <div id="score-board" class="top-stat">SCORE: 0</div>
        <div id="timer-board" class="top-stat">TIME: 0.0s</div>
      </div>

      <div id="power-gauge">
        <div id="power-fill"></div>
        <div id="power-text">🐥 병아리 타임! 🐥</div>
      </div>

      <div id="pause-btn" onclick="togglePause()">⏸️</div>

      <canvas id="gameCanvas"></canvas>
      <div id="status-msg">모드를 선택해주세요.</div>
      <div id="brand-logo">
        <span class="brand-highlight">진담중국어</span> 팩맨
      </div>

      <div id="ui-layer">
        <div id="main-menu-modal" class="modal">
          <h2 style="margin-top: 0">🎮 게임 모드 선택</h2>
          <button class="main-game-btn" onclick="startRankedGame()">
            🔥 본게임 시작<br /><span
              style="font-size: 12px; font-weight: normal"
              >(모든 스테이지 연속 플레이 / 랭킹 도전)</span
            >
          </button>

          <button class="hell-game-btn" onclick="startHellMode()">
            😈 지옥 모드<br /><span style="font-size: 12px; font-weight: normal"
              >(적 6마리, 모든 스테이지 / 랭킹 도전)</span
            >
          </button>

          <div style="border-top: 2px dashed #444; margin: 15px 0"></div>
          <p style="margin: 0; font-size: 14px; color: #aaa">
            📖 연습 모드 (랭킹 미기록)
          </p>
          <div class="stage-btn-grid" id="practice-btn-container"></div>
        </div>

        <div id="quiz-modal" class="modal">
          <h2>알맞은 중국어 문장은?</h2>
          <div id="korean-text">한국어 뜻</div>
          <div id="options-container"></div>
        </div>

        <div id="game-end-msg" class="modal"></div>

        <div id="rank-board-modal" class="modal">
          <h2 class="rank-title" id="rank-title-text">🏆 명예의 전당 🏆</h2>
          <div
            style="
              display: flex;
              justify-content: center;
              gap: 10px;
              margin-bottom: 15px;
            "
          >
            <button
              id="tab-normal"
              style="
                padding: 8px 15px;
                font-size: 14px;
                font-weight: bold;
                background: #00fff5;
                color: #16213e;
                border: 2px solid #00fff5;
                border-radius: 8px;
                cursor: pointer;
                transition: 0.2s;
              "
              onclick="showRankBoard(false)"
            >
              본게임
            </button>
            <button
              id="tab-hell"
              style="
                padding: 8px 15px;
                font-size: 14px;
                font-weight: bold;
                background: #16213e;
                color: #e94560;
                border: 2px solid #e94560;
                border-radius: 8px;
                cursor: pointer;
                transition: 0.2s;
              "
              onclick="showRankBoard(true)"
            >
              지옥모드
            </button>
          </div>
          <div class="rank-list rank-item rank-header">
            <span style="width: 15%">순위</span>
            <span style="width: 40%">이름</span>
            <span style="width: 20%">점수</span>
            <span style="width: 25%; text-align: right">시간</span>
          </div>
          <ul id="rank-list-ul" class="rank-list"></ul>
          <div class="btn-group">
            <button class="btn-primary" onclick="resetToMainMenu()">
              메인 화면으로
            </button>
            <button class="btn-secondary" onclick="showResetConfirm()">
              기록 초기화
            </button>
          </div>
        </div>

        <div id="confirm-reset-modal" class="modal">
          <h2 style="color: #e94560; margin-top: 0">⚠️ 초기화 경고</h2>
          <p
            id="reset-confirm-msg"
            style="font-size: 15px; margin-bottom: 20px"
          >
            정말 랭킹 기록을 지우시겠습니까?<br /><span
              style="font-size: 12px; color: #aaa"
              >(이 작업은 되돌릴 수 없습니다)</span
            >
          </p>
          <div class="btn-group">
            <button class="btn-primary" onclick="executeResetRank()">
              네, 지웁니다
            </button>
            <button class="btn-secondary" onclick="cancelResetRank()">
              아니오 (취소)
            </button>
          </div>
        </div>

        <div id="pause-modal" class="modal">
          <h2 style="color: #00fff5; margin-top: 0">⏸️ 일시정지</h2>
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 15px;
              margin-top: 20px;
            "
          >
            <button
              class="main-game-btn"
              style="margin-bottom: 0"
              onclick="resumeGame()"
            >
              ▶️ 계속하기
            </button>
            <button
              class="stage-select-btn"
              onclick="
                resumeGame();
                resetToMainMenu();
              "
            >
              🏠 메인 화면으로
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="mobile-controls">
      <button class="dpad-btn" onpointerdown="handleVirtualPad('up', event)">
        ▲
      </button>
      <div class="dpad-row">
        <button
          class="dpad-btn"
          onpointerdown="handleVirtualPad('left', event)"
        >
          ◀
        </button>
        <button
          class="dpad-btn"
          onpointerdown="handleVirtualPad('down', event)"
        >
          ▼
        </button>
        <button
          class="dpad-btn"
          onpointerdown="handleVirtualPad('right', event)"
        >
          ▶
        </button>
      </div>
    </div>
  </body>
</html>
